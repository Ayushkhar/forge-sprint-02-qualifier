model:
  default: meta-llama/llama-3.3-70b-instruct
  provider: openrouter

providers: {}
fallback_providers: []
credential_pool_strategies: {}

toolsets:
- hermes-cli

agent:
  max_turns: 5
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto

terminal:
  backend: local
  modal_mode: auto
  cwd: .
  timeout: 180

checkpoints:
  enabled: false

slack:
  require_mention: false
  free_response_channels: ''
  allowed_channels: ''
  channel_prompts: {}

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny

cron:
  wrap_response: true

kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60

logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
